name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install, build, and upload site
        uses: withastro/action@v5
        with:
          path: ./site
          node-version: 22
        env:
          # Public base URL of the kornerflag-site-assets R2 bucket (r2.dev).
          # Not a secret — a public CDN URL. Set as a repo Variable so the
          # production build resolves r2Asset() paths instead of emitting
          # broken root-relative URLs. See docs/decisions/0001-cloudflare-r2-storage.md.
          PUBLIC_R2_ASSETS_URL: ${{ vars.PUBLIC_R2_ASSETS_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
