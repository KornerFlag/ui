<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-1);font-family:var(--font-ui);padding:24px 28px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .card{background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 16px 14px;box-shadow:var(--shadow-sm)}
  .lab{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-4);display:flex;align-items:center;gap:6px}
  .val{font-family:var(--font-mono);font-weight:500;font-size:32px;letter-spacing:-.01em;color:var(--fg-1);margin-top:10px;font-variant-numeric:tabular-nums}
  .sub{font-size:12px;color:var(--fg-3);margin-top:3px}
  .u{font-size:16px;color:var(--fg-3)}
  .ico{width:7px;height:7px;border-radius:2px;background:var(--steel-600)}
</style></head>
<body>
  <div class="grid">
    <div class="card"><div class="lab"><span class="ico"></span>Possession</div><div class="val">54<span class="u">%</span></div><div class="sub">vs 46% opponent</div></div>
    <div class="card"><div class="lab"><span class="ico"></span>Team distance</div><div class="val">67.4<span class="u"> km</span></div><div class="sub">across 92:14</div></div>
    <div class="card"><div class="lab"><span class="ico"></span>Passes</div><div class="val">412</div><div class="sub">total in match</div></div>
  </div>
</body></html>
