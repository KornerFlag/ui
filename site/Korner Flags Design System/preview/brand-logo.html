<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{display:flex;font-family:var(--font-ui)}
  .panel{flex:1;display:flex;align-items:center;gap:13px;padding:30px 34px}
  .light{background:var(--surface-0);border-right:1px solid var(--border)}
  .dark{background:var(--ink-800)}
  .lock{display:flex;align-items:center;gap:12px}
  .mark svg{width:38px;height:38px;display:block}
  .word{font-family:var(--font-display);font-weight:600;font-size:25px;letter-spacing:-.02em;line-height:1}
  .tm{font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
</style></head>
<body>
  <div class="panel light">
    <div class="lock">
      <span class="mark" style="color:var(--steel-600)"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Korner Flags mark">
  
  <rect x="13" y="6" width="3" height="36" rx="1.5" fill="currentColor"></rect>
  <path d="M16 8.5 L37 14.2 C38.2 14.5 38.2 16.2 37 16.5 L16 22.2 Z" fill="currentColor"></path>
  <circle cx="14.5" cy="42" r="3.2" fill="currentColor"></circle>
</svg></span>
      <span><span class="word" style="color:var(--ink-800)">Korner Flags</span><div class="tm" style="color:var(--slate-400)">Match analysis</div></span>
    </div>
  </div>
  <div class="panel dark">
    <div class="lock">
      <span class="mark" style="color:var(--steel-400)"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Korner Flags mark">
  
  <rect x="13" y="6" width="3" height="36" rx="1.5" fill="currentColor"></rect>
  <path d="M16 8.5 L37 14.2 C38.2 14.5 38.2 16.2 37 16.5 L16 22.2 Z" fill="currentColor"></path>
  <circle cx="14.5" cy="42" r="3.2" fill="currentColor"></circle>
</svg></span>
      <span><span class="word" style="color:#fff">Korner Flags</span><div class="tm" style="color:var(--fg-on-ink-soft)">Match analysis</div></span>
    </div>
  </div>
</body></html>
