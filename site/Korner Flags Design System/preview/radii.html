<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-1);font-family:var(--font-ui);padding:28px 30px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:var(--surface-0);border:1px solid var(--border)}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-4)}
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-xs)"></div><span class="lab">xs · 4</span></div>
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-sm)"></div><span class="lab">sm · 6</span></div>
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-md)"></div><span class="lab">md · 10</span></div>
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-lg)"></div><span class="lab">lg · 14</span></div>
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-xl)"></div><span class="lab">xl · 20</span></div>
    <div class="cell"><div class="box" style="width:60px;height:60px;border-radius:var(--radius-pill)"></div><span class="lab">pill</span></div>
  </div>
</body></html>
