<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-1);font-family:var(--font-ui);padding:22px 26px;display:flex;gap:18px}
  .card{flex:1;background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
  /* thumbnail with mini heat-pitch */
  .thumb{position:relative;height:118px;background:linear-gradient(150deg,#0E1A2B,#1F344F)}
  .pitch{position:absolute;inset:14% 10%;opacity:.55}
  .pl{position:absolute;border:1px solid rgba(255,255,255,.18);border-radius:3px}
  .blob{position:absolute;border-radius:50%;filter:blur(11px);transform:translate(-50%,-50%)}
  .badge{position:absolute;top:11px;left:11px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .play{position:absolute;right:11px;bottom:11px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff}
  .body{padding:15px 17px;display:flex;flex-direction:column;flex:1}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--steel-600)}
  .ttl{font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:-.01em;color:var(--fg-1);margin-top:3px}
  .meta{display:flex;align-items:center;gap:7px;margin-top:5px;font-family:var(--font-mono);font-size:12px;color:var(--fg-4)}
  .meta svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .stats{display:flex;gap:18px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border-soft);align-items:center}
  .s{display:flex;flex-direction:column;gap:1px}
  .sv{font-family:var(--font-mono);font-weight:500;font-size:15px;color:var(--fg-1)}
  .sl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-4)}
  .open{margin-left:auto;font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--steel-700);background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px}
  .muted{margin-left:auto;font-size:12px;font-weight:600;color:var(--amber-600)}
</style></head>
<body>
  <!-- Ready -->
  <div class="card">
    <div class="thumb">
      <div class="blob" style="left:24%;top:42%;width:84px;height:84px;background:radial-gradient(circle,#B24A36,transparent 70%);opacity:.7"></div>
      <div class="blob" style="left:34%;top:62%;width:96px;height:96px;background:radial-gradient(circle,#D98A3D,transparent 70%);opacity:.6"></div>
      <div class="blob" style="left:58%;top:46%;width:74px;height:74px;background:radial-gradient(circle,#4F86C6,transparent 70%);opacity:.55"></div>
      <div class="pitch"><div class="pl" style="inset:0"></div><div class="pl" style="left:50%;top:0;bottom:0;width:0;border-left:1px solid rgba(255,255,255,.18)"></div><div class="pl" style="left:50%;top:50%;width:30px;height:30px;border-radius:50%;transform:translate(-50%,-50%)"></div></div>
      <span class="badge" style="background:var(--pitch-100);color:var(--pitch-600)"><span class="dot"></span>Ready</span>
      <span class="play"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="margin-left:2px"><polygon points="6 3 20 12 6 21 6 3"/></svg></span>
    </div>
    <div class="body">
      <div class="lbl">Final Review</div>
      <div class="ttl">NC State vs Washington</div>
      <div class="meta">
        <svg width="13" height="13" viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>Mar 14, 2026
        <span style="opacity:.5">·</span>
        <svg width="13" height="13" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>92:14
      </div>
      <div class="stats">
        <div class="s"><span class="sv">54/46</span><span class="sl">Poss</span></div>
        <div class="s"><span class="sv">412</span><span class="sl">Passes</span></div>
        <div class="s"><span class="sv">67.4km</span><span class="sl">Dist</span></div>
        <button class="open">Open</button>
      </div>
    </div>
  </div>

  <!-- Processing -->
  <div class="card">
    <div class="thumb">
      <div class="blob" style="left:50%;top:50%;width:104px;height:104px;background:radial-gradient(circle,#3D7FC4,transparent 70%);opacity:.4"></div>
      <div class="pitch"><div class="pl" style="inset:0"></div><div class="pl" style="left:50%;top:0;bottom:0;width:0;border-left:1px solid rgba(255,255,255,.18)"></div><div class="pl" style="left:50%;top:50%;width:30px;height:30px;border-radius:50%;transform:translate(-50%,-50%)"></div></div>
      <span class="badge" style="background:var(--amber-100);color:var(--amber-600)"><span class="dot"></span>Processing</span>
    </div>
    <div class="body">
      <div class="lbl">Conference Match</div>
      <div class="ttl">NC State vs Duke</div>
      <div class="meta">
        <svg width="13" height="13" viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>Mar 2, 2026
        <span style="opacity:.5">·</span>
        <svg width="13" height="13" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>91:40
      </div>
      <div class="stats">
        <div class="s"><span class="sv">—</span><span class="sl">Poss</span></div>
        <div class="s"><span class="sv">—</span><span class="sl">Passes</span></div>
        <div class="s"><span class="sv">—</span><span class="sl">Dist</span></div>
        <span class="muted">Analyzing…</span>
      </div>
    </div>
  </div>
</body></html>
