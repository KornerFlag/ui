<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-ui);padding:24px 32px;color:var(--fg-1)}
  table{width:100%;border-collapse:collapse}
  td{padding:7px 0;border-bottom:1px solid var(--border-soft);vertical-align:baseline}
  .nm{font-size:13px;font-weight:600;color:var(--fg-2);width:120px}
  .px{font-family:var(--font-mono);font-size:12px;color:var(--fg-4);width:70px}
  .sp{font-family:var(--font-display);color:var(--fg-1);font-weight:600;letter-spacing:-.02em;line-height:1}
</style></head>
<body>
  <table>
    <tr><td class="nm">Display</td><td class="px">60 / 600</td><td class="sp" style="font-size:34px">Aa</td></tr>
    <tr><td class="nm">H1</td><td class="px">40 / 600</td><td class="sp" style="font-size:28px">Aa</td></tr>
    <tr><td class="nm">H2</td><td class="px">30 / 600</td><td class="sp" style="font-size:22px">Aa</td></tr>
    <tr><td class="nm" style="font-family:var(--font-ui)">H3 (sans)</td><td class="px">22 / 700</td><td style="font-family:var(--font-ui);font-weight:700;font-size:18px">Aa</td></tr>
    <tr><td class="nm" style="font-family:var(--font-ui)">Body</td><td class="px">16 / 400</td><td style="font-family:var(--font-ui);font-size:15px">Aa</td></tr>
    <tr style="border:0"><td class="nm" style="font-family:var(--font-ui)">Caption</td><td class="px">14 / 400</td><td style="font-family:var(--font-ui);font-size:13px;color:var(--fg-3)">Aa</td></tr>
  </table>
</body></html>
