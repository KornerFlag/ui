<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-ui);padding:24px 30px}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{background:var(--steel-200);height:16px;border-radius:3px}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--fg-4);width:78px;flex:none}
</style></head>
<body>
  <div class="row"><span class="nm">2 · 8 · 12</span><span class="bar" style="width:8px"></span><span class="bar" style="width:16px;background:var(--steel-400)"></span><span class="bar" style="width:24px;background:var(--steel-600)"></span></div>
  <div class="row"><span class="nm">space-4 16</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="nm">space-6 24</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="nm">space-8 32</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="nm">space-12 48</span><span class="bar" style="width:96px"></span></div>
  <div class="row" style="margin-bottom:0"><span class="nm">space-20 80</span><span class="bar" style="width:160px"></span></div>
</body></html>
