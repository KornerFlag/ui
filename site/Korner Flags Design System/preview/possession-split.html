<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-1);font-family:var(--font-ui);padding:26px 30px}
  .wrap{background:var(--surface-0);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;box-shadow:var(--shadow-sm)}
  .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .ttl{font-size:14px;font-weight:700;color:var(--fg-1)}
  .est{font-size:11px;color:var(--fg-4)}
  .bar{display:flex;height:40px;border-radius:8px;overflow:hidden}
  .a{background:var(--steel-600);display:flex;align-items:center;padding-left:14px;color:#fff}
  .b{background:var(--slate-200);display:flex;align-items:center;justify-content:flex-end;padding-right:14px;color:var(--slate-700)}
  .pct{font-family:var(--font-mono);font-weight:600;font-size:18px}
  .nm{font-size:11px;font-weight:600;opacity:.85;margin-left:8px}
  .cap{font-size:12px;color:var(--fg-3);margin-top:12px;line-height:1.5}
</style></head>
<body>
  <div class="wrap">
    <div class="top"><span class="ttl">Possession</span><span class="est">Estimated</span></div>
    <div class="bar"><div class="a" style="width:54%"><span class="pct">54%</span><span class="nm">NC STATE</span></div><div class="b" style="width:46%"><span class="nm">OPPONENT</span><span class="pct">46%</span></div></div>
    <div class="cap">Estimated from processed match segments and intended for tactical review.</div>
  </div>
</body></html>
