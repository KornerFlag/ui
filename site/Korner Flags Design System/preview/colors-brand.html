<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-ui);padding:24px 28px}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:10px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;box-shadow:var(--shadow-xs)}
  .n{font-size:12px;font-weight:700;color:#fff}
  .h{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.72);margin-top:1px}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-900)"><span class="n">ink-900</span><span class="h">#0B1626</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="n">ink-800</span><span class="h">#0F1C2E</span></div>
    <div class="sw" style="background:var(--steel-700)"><span class="n">steel-700</span><span class="h">#1F4E82</span></div>
    <div class="sw" style="background:var(--steel-600)"><span class="n">steel-600 ·primary</span><span class="h">#2C6BB0</span></div>
    <div class="sw" style="background:var(--steel-400)"><span class="n">steel-400</span><span class="h">#6BA0D8</span></div>
    <div class="sw" style="background:var(--steel-100)"><span class="n" style="color:var(--steel-700)">steel-100</span><span class="h" style="color:var(--steel-600)">#E4EEF9</span></div>
  </div>
</body></html>
