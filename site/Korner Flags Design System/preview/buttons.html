<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-ui);padding:26px 30px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-ui);font-size:14px;font-weight:600;border-radius:var(--radius-sm);padding:10px 18px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all var(--dur-base) var(--ease-out)}
  .primary{background:var(--steel-600);color:#fff}
  .primary.hover{background:var(--steel-700)}
  .secondary{background:#fff;color:var(--steel-700);border-color:var(--border)}
  .secondary.hover{background:var(--steel-050);border-color:var(--steel-200)}
  .ghost{background:transparent;color:var(--fg-2)}
  .ghost.hover{background:var(--slate-100)}
  .dark{background:#fff;color:var(--ink-800)}
  .small{font-size:13px;padding:7px 13px}
  .lab{font-size:11px;color:var(--fg-4);width:56px;flex:none}
</style></head>
<body>
  <div class="row"><span class="lab">default</span><button class="btn primary">View sample analysis</button><button class="btn secondary">See packages</button><button class="btn ghost">Cancel</button></div>
  <div class="row"><span class="lab">hover</span><button class="btn primary hover">View sample analysis</button><button class="btn secondary hover">See packages</button><button class="btn ghost hover">Cancel</button></div>
  <div class="row"><span class="lab">small</span><button class="btn primary small">Open analysis</button><button class="btn secondary small">Filter</button><span style="background:var(--ink-800);padding:8px;border-radius:8px"><button class="btn dark small">On navy</button></span></div>
</body></html>
