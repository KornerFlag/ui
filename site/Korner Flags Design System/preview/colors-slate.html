<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-ui);padding:24px 28px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:9px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 10px;border:1px solid var(--border-soft)}
  .n{font-size:11px;font-weight:700}
  .h{font-family:var(--font-mono);font-size:10px;margin-top:1px;opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--slate-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:#fff">#16202E</span></div>
    <div class="sw" style="background:var(--slate-700)"><span class="n" style="color:#fff">700·text</span><span class="h" style="color:#fff">#344256</span></div>
    <div class="sw" style="background:var(--slate-500)"><span class="n" style="color:#fff">500</span><span class="h" style="color:#fff">#677789</span></div>
    <div class="sw" style="background:var(--slate-400)"><span class="n" style="color:#fff">400·mute</span><span class="h" style="color:#fff">#8C9AAC</span></div>
    <div class="sw" style="background:var(--slate-200)"><span class="n" style="color:var(--slate-700)">200·bord</span><span class="h" style="color:var(--slate-700)">#DAE1E9</span></div>
    <div class="sw" style="background:var(--surface-1)"><span class="n" style="color:var(--slate-700)">surf-1</span><span class="h" style="color:var(--slate-700)">#F7F9FC</span></div>
  </div>
</body></html>
