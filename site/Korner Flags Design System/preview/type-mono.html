<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-0);font-family:var(--font-mono);padding:28px 32px;color:var(--fg-1)}
  .grid{display:flex;gap:34px;align-items:flex-end;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;gap:4px}
  .v{font-family:var(--font-mono);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.01em;color:var(--fg-1)}
  .l{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-4)}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><span class="v" style="font-size:44px">54%</span><span class="l">Possession</span></div>
    <div class="cell"><span class="v" style="font-size:44px">67.4<span style="font-size:22px;color:var(--fg-3)"> km</span></span><span class="l">Team distance</span></div>
    <div class="cell"><span class="v" style="font-size:44px">412</span><span class="l">Passes</span></div>
    <div class="cell"><span class="v" style="font-size:44px;color:var(--steel-600)">92:14</span><span class="l">Duration</span></div>
  </div>
  <div style="margin-top:22px;font-family:var(--font-mono);font-size:13px;color:var(--fg-3);letter-spacing:.02em">IBM&nbsp;Plex&nbsp;Mono · tabular-nums · 0123456789 / % km : —</div>
</body></html>
