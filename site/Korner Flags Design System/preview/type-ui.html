<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

  .row{display:flex;align-items:baseline;gap:14px;margin-bottom:13px}
  .tag{font-size:11px;font-weight:600;color:var(--fg-4);width:78px;flex:none}

<body>
  <div class="row"><span class="tag">H3 · 700</span><span style="font-size:22px;font-weight:700">Player running output</span></div>
  <div class="row"><span class="tag">Body · 16</span><span style="font-size:16px;font-weight:400;color:var(--fg-2);line-height:1.5">Review movement, possession, and tactical shape with supporting metrics.</span></div>
  <div class="row"><span class="tag">Caption 14</span><span style="font-size:14px;color:var(--fg-3)">Estimated from processed match segments.</span></div>
  <div class="row" style="margin-bottom:0"><span class="tag">Eyebrow</span><span style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)">Match Review</span></div>
